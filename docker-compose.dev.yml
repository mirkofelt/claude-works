services:
  claude-works:
    build: .
    container_name: claude-works-dev
    volumes:
      - .:/app
      - claude-works-dev-data:/data
    ports:
      - "8080:8080"
    environment:
      - SETTINGS_FILE=/data/settings.json
      - LOG_LEVEL=DEBUG
      - DEV_MODE=true
    command: python -m supervisor.supervisor --dev

volumes:
  claude-works-dev-data:
