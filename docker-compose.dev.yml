services:
  comms:
    build: .
    container_name: comms-dev
    volumes:
      - .:/app
      - comms-dev-data:/data
    ports:
      - "8080:8080"
    environment:
      - SETTINGS_FILE=/data/settings.json
      - LOG_LEVEL=DEBUG
      - DEV_MODE=true
    command: python -m supervisor.supervisor --dev

volumes:
  comms-dev-data:
