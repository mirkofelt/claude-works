services:
  claude-works:
    build: .
    container_name: claude-works
    restart: unless-stopped
    volumes:
      - claude-works-data:/data
      - ${CLAUDE_BIN:-/root/.claude/npm-global/bin/claude}:/usr/local/bin/claude:ro
      - ${CLAUDE_HOME:-/root/.claude}:/root/.claude
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=INFO

volumes:
  claude-works-data:

networks:
  claude-works-net:
    driver: bridge
