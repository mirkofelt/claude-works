name: Render Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/*.md"
      - "scripts/render_docs.py"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render markdown to HTML
        run: python scripts/render_docs.py

      - name: Commit rendered HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.html
          git diff --cached --quiet || git commit -m "docs: auto-render markdown to HTML [skip ci]"
          git push
