name: Render Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/*.md"
      - "scripts/render_docs.py"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render markdown to HTML
        run: python scripts/render_docs.py

      - name: Commit rendered HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.html
          git diff --cached --quiet || git commit -m "docs: auto-render markdown to HTML [skip ci]"
          git push

      - name: Delete old GitHub Pages deployments
        uses: actions/github-script@v7
        with:
          script: |
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'github-pages',
              per_page: 100,
            });
            const toDelete = deployments.slice(1);
            for (const d of toDelete) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: d.id,
                state: 'inactive',
              });
              await github.rest.repos.deleteDeployment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: d.id,
              });
            }
            if (toDelete.length > 0) {
              core.info(`Deleted ${toDelete.length} old github-pages deployment(s).`);
            }
