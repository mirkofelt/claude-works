name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Test, Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Check JS syntax in index.html
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('claude_works/web/static/index.html', 'utf8');
            const m = html.match(/<script>([\s\S]*?)<\/script>/g);
            if (!m) process.exit(0);
            m.forEach((block, i) => {
              const js = block.replace(/<\/?script>/g, '');
              try { new Function(js); } catch(e) { console.error('JS block', i, 'error:', e.message); process.exit(1); }
            });
            console.log('JS syntax OK');
          "

      - name: Get version tag
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
          SHA=$(git rev-parse --short HEAD)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.sha }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete old container versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: claude-works
          package-type: container
          min-versions-to-keep: 8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          body: |
            Docker image: `ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}`

      - name: Trigger deploy (optional)
        if: vars.DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -sf --max-time 10 -X POST \
            "${{ vars.DEPLOY_WEBHOOK_URL }}/deploy?token=${{ secrets.DEPLOY_TOKEN }}" \
            || echo "Deploy webhook call failed (non-fatal)"
